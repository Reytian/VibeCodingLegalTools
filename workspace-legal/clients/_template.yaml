# ============================================================
# Client Memory Template — Counsel (Legal Agent)
# Copy this file as <client-slug>.yaml to create a new client.
# This file is LOCAL ONLY. Never send to cloud AI without anonymization.
# ============================================================

# Client Identity
client_id: ""                       # Unique slug, must match filename (e.g., "acme-corp")
legal_name: ""                      # Full legal name of the primary entity
legal_name_local: ""                # Native-script name if applicable (e.g., Chinese/Korean)
entity_type: ""                     # corporation | llc | lp | individual | trust | foundation
jurisdiction: ""                    # Jurisdiction of incorporation/formation
registration_number: ""
tax_id: ""                          # EIN (US), UTR (UK), USCI (PRC), etc.
date_of_incorporation: ""

# Registered Address
registered_address:
  street: ""
  city: ""
  state: ""
  country: ""
  postal_code: ""

# Primary Contact
primary_contact:
  name: ""
  title: ""
  email: ""
  phone: ""

# Additional Contacts
contacts: []
  # - name: ""
  #   title: ""
  #   email: ""
  #   phone: ""

# Authorized Signatories
signatories: []
